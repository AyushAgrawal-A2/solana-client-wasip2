name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: |
          cargo fmt --all --check
          # The wasm-smoke component is a standalone crate.
          cargo fmt --manifest-path wasm-smoke/Cargo.toml --check

  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (host, all targets)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Clippy (wasm library)
        run: cargo clippy --lib --target wasm32-wasip2 -- -D warnings

  wasm-build:
    name: Build wasm32-wasip2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Build library as a wasm component
        run: cargo build --target wasm32-wasip2 --release

  test:
    name: Test (unit + live validator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Install wasmtime (for the wasm smoke test)
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
      - name: Install Agave / solana-test-validator
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Versions
        run: |
          solana-test-validator --version
          wasmtime --version
      - name: cargo test
        run: cargo test --all-features
