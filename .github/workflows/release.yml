name: Release

# Runs only after the CI workflow completes on main. Gated on CI success below,
# so a release happens only when fmt, clippy, wasm-build, and test all passed.
# Then, iff the package version in Cargo.toml changed relative to the previous
# commit, it tags, cuts a GitHub Release, and publishes to crates.io. A no-op
# otherwise, so it is safe after every merge.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag, release & publish on version bump
    # Only when CI succeeded, and only for a push to main (not PR-triggered CI).
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run defaults to the default branch; check out the exact
          # commit CI validated, with its parent for the version diff.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - uses: dtolnay/rust-toolchain@stable

      - name: Detect version bump
        id: detect
        run: |
          set -euo pipefail
          version_of() { sed -n '/^\[package\]/,/^\[/ s/^version *= *"\(.*\)"/\1/p'; }

          new=$(version_of < Cargo.toml)
          old=$(git show HEAD~1:Cargo.toml 2>/dev/null | version_of || true)
          echo "previous: ${old:-<none>}"
          echo "current:  $new"
          echo "version=$new" >> "$GITHUB_OUTPUT"
          if [ "${old:-}" != "$new" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub release
        if: steps.detect.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${{ steps.detect.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes

      - name: Publish to crates.io
        if: steps.detect.outputs.bumped == 'true'
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
